<svg width="192" height="192" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Top cap 3D gradient -->
    <linearGradient id="topCap" x1="1" y1="1.5" x2="23" y2="13">
      <stop offset="0%" stop-color="#6FA3FF"/>
      <stop offset="55%" stop-color="#3366CC"/>
      <stop offset="100%" stop-color="#1A3A73"/>
    </linearGradient>

    <!-- Base 3D gradient -->
    <linearGradient id="baseCap" x1="4.5" y1="12.8" x2="19.5" y2="22.2">
      <stop offset="0%" stop-color="#3F73E0"/>
      <stop offset="100%" stop-color="#162F5C"/>
    </linearGradient>

    <!-- Soft shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0.8" stdDeviation="0.6" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Top cap + tassel structure (unchanged shape, upgraded depth) -->
  <path d="M12 1.5L1 7.5L12 13L21.5 8.5V16.5H23.5V7.5L12 1.5Z"
        fill="url(#topCap)" filter="url(#shadow)"/>

  <!-- subtle highlight edge -->
  <path d="M12 1.5L21.5 8.5L12 13L1 7.5L12 1.5Z"
        fill="none" stroke="#9CC0FF" stroke-width="0.3" opacity="0.5"/>

  <!-- Bottom V base (3D shaded) -->
  <path d="M4.5 12.8V17.5L12 22.2L19.5 17.5V12.8L12 16.8L4.5 12.8Z"
        fill="url(#baseCap)" filter="url(#shadow)"/>

  <!-- Inner depth layer -->
  <path d="M5.3 13.4V16.8L12 21L18.7 16.8V13.4L12 17L5.3 13.4Z"
        fill="#0F2B55" opacity="0.25"/>

</svg>